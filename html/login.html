</head>
<body>

    <header>
        <h1>Sé parte de esta gran familia</h1>

    <nav>
        <ul>

    <main>
        <h2>Registrate para que no te pierdas las ultimas actualizaciones</h2>
        <section class="registro_container">
            <h2>Registro</h2>
            <form id="formulario_registro">
                <div class="input_group">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="input_group">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input_group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn_accion">Registrarse</button>
                <button id="btn_cerrar" class="btn_accion" style="display:none;">Cerrar sesión</button>
            </form>
            <p id="mensaje_registro"></p>
        </section>
    </main>

    <footer>
        <p>© Proyecto Final FTW - Ketzel GV</p>
    </footer>

    <script src="../javascript/login.js"></script>

</body>
</html>
